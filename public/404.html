<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>HOOP Marketing</title>
    <script type="text/javascript">
      // SPA redirect for GitHub Pages
      // Stores the full path in sessionStorage then redirects to root
      var l = window.location;
      sessionStorage.redirect = l.pathname + l.search + l.hash;
      l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + '/');
    </script>
  </head>
  <body></body>
</html>
